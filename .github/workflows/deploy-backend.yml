name: Build And Deploy Backend

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      deploy_target:
        description: Deployment target
        required: true
        default: both
        type: choice
        options:
          - beta
          - production
          - both
      beta_host_port:
        description: Host port for the beta backend container
        required: true
        default: '3101'
        type: string
      production_host_port:
        description: Host port for the production backend container
        required: true
        default: '3001'
        type: string

permissions:
  contents: read

env:
  PLATFORM: linux/amd64
  CACHE_SCOPE: backend-container
  DEPLOY_USER: github
  REMOTE_IMAGE_DIR: /tmp/umamoe-backend-images
  REMOTE_COMPOSE_FILE: /opt/umamoe-backend/backend.compose.yml
  APP_NETWORK_NAME: umamoe-services
  PROD_CONTAINER_NAME: umamoe-backend
  BETA_CONTAINER_NAME: umamoe-backend-beta
  PROD_ENV_FILE: /opt/umamoe-backend/prod.env
  BETA_ENV_FILE: /opt/umamoe-backend/beta.env
  APP_PORT: '3001'
  INTERNAL_APP_PORT: '3005'

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Backend Image
    runs-on: ubuntu-latest
    outputs:
      archive_name: ${{ steps.meta.outputs.archive_name }}
      beta_host_port: ${{ steps.plan.outputs.beta_host_port }}
      deploy_target: ${{ steps.plan.outputs.deploy_target }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      production_host_port: ${{ steps.plan.outputs.production_host_port }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Choose deployment plan
        id: plan
        shell: bash
        run: |
          deploy_target="${{ github.event.inputs.deploy_target || 'both' }}"
          beta_host_port="${{ github.event.inputs.beta_host_port || '3101' }}"
          production_host_port="${{ github.event.inputs.production_host_port || '3001' }}"

          echo "deploy_target=$deploy_target" >> "$GITHUB_OUTPUT"
          echo "beta_host_port=$beta_host_port" >> "$GITHUB_OUTPUT"
          echo "production_host_port=$production_host_port" >> "$GITHUB_OUTPUT"

      - name: Set image metadata
        id: meta
        shell: bash
        run: |
          image_tag="umamoe-backend:${GITHUB_SHA}"
          archive_name="umamoe-backend-${GITHUB_SHA}.tar.gz"

          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "archive_name=$archive_name" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORM }}
          pull: true
          load: true
          tags: ${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha,scope=${{ env.CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.CACHE_SCOPE }}

      - name: Save backend image
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          docker save "${{ steps.meta.outputs.image_tag }}" | gzip -1 > "${{ runner.temp }}/${{ steps.meta.outputs.archive_name }}"

      - name: Upload backend image artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: ${{ runner.temp }}/${{ steps.meta.outputs.archive_name }}
          if-no-files-found: error

  deploy_dev:
    name: Deploy Dev
    if: github.event_name != 'pull_request' && contains(fromJSON('["beta", "production", "both"]'), needs.build.outputs.deploy_target)
    needs: build
    runs-on: ubuntu-latest
    environment: beta

    steps:
      - name: Download backend image artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-image
          path: ${{ runner.temp }}

      - name: Checkout deployment files
        uses: actions/checkout@v4
        with:
          sparse-checkout: deploy/backend.compose.yml
          sparse-checkout-cone-mode: false

      - name: Mask deployment metadata
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          mask_value() {
            local value="$1"
            if [[ -n "$value" ]]; then
              echo "::add-mask::$value"
            fi
          }

          mask_value "$DEPLOY_HOST"

          while IFS= read -r known_host_line; do
            mask_value "$known_host_line"
            read -r known_host _ key_body _ <<< "$known_host_line"
            mask_value "$known_host"
            mask_value "$key_body"
          done <<< "$DEPLOY_KNOWN_HOSTS"

      - name: Start SSH agent
        shell: bash
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          eval "$(ssh-agent -s)" >/dev/null
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
          ssh-add - <<< "$DEPLOY_SSH_KEY" >/dev/null 2>&1

      - name: Configure known hosts
        shell: bash
        env:
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -z "$DEPLOY_KNOWN_HOSTS" ]; then
            echo "DEPLOY_KNOWN_HOSTS is required for deploy host verification." >&2
            exit 1
          fi
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy dev container
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          ARCHIVE_NAME: ${{ needs.build.outputs.archive_name }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          HOST_PORT: ${{ needs.build.outputs.beta_host_port }}
          CONTAINER_NAME: ${{ env.BETA_CONTAINER_NAME }}
          APP_PORT: ${{ env.APP_PORT }}
          INTERNAL_APP_PORT: ${{ env.INTERNAL_APP_PORT }}
          ENV_FILE: ${{ env.BETA_ENV_FILE }}
        run: |
          set -euo pipefail

          remote_archive="${REMOTE_IMAGE_DIR}/${ARCHIVE_NAME}"
          remote_compose_dir="$(dirname "$REMOTE_COMPOSE_FILE")"

          ssh -o LogLevel=ERROR -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$REMOTE_IMAGE_DIR' '$remote_compose_dir'"
          rsync -az -e "ssh -o LogLevel=ERROR -p $DEPLOY_PORT" "${{ runner.temp }}/${ARCHIVE_NAME}" "$DEPLOY_USER@$DEPLOY_HOST:$remote_archive"
          rsync -az -e "ssh -o LogLevel=ERROR -p $DEPLOY_PORT" "deploy/backend.compose.yml" "$DEPLOY_USER@$DEPLOY_HOST:$REMOTE_COMPOSE_FILE"

          ssh -o LogLevel=ERROR -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" 'bash -s' -- \
            "$remote_archive" "$IMAGE_TAG" "$CONTAINER_NAME" "$APP_PORT" "$INTERNAL_APP_PORT" "$HOST_PORT" "$ENV_FILE" "$REMOTE_COMPOSE_FILE" "$APP_NETWORK_NAME" <<'REMOTE_SCRIPT'
          set -euo pipefail

          archive="$1"
          image_tag="$2"
          container_name="$3"
          app_port="$4"
          internal_app_port="$5"
          host_port="$6"
          env_file="$7"
          compose_file="$8"
          network_name="$9"

          if [ ! -f "$env_file" ]; then
            echo "Missing container env file: $env_file" >&2
            exit 1
          fi

          if [ ! -f "$compose_file" ]; then
            echo "Missing backend compose file: $compose_file" >&2
            exit 1
          fi

          if ! docker compose version >/dev/null 2>&1; then
            echo "Docker Compose v2 is required to manage the shared Redis container." >&2
            exit 1
          fi

          docker network inspect "$network_name" >/dev/null 2>&1 || docker network create "$network_name" >/dev/null
          docker compose -f "$compose_file" up -d --no-recreate redis

          gzip -dc "$archive" | docker load

          docker rm -f "$container_name" >/dev/null 2>&1 || true
          docker run -d \
            --name "$container_name" \
            --restart unless-stopped \
            --add-host host.docker.internal:host-gateway \
            --network "$network_name" \
            --env-file "$env_file" \
            -e HOST=0.0.0.0 \
            -e PORT="$app_port" \
            -e BROWSER_PROOF_INTERNAL_HOST=0.0.0.0 \
            -e BROWSER_PROOF_INTERNAL_PORT="$internal_app_port" \
            -e DEBUG_MODE=false \
            -p "127.0.0.1:${host_port}:${app_port}" \
            "$image_tag"

          for _ in $(seq 1 45); do
            running="$(docker inspect --format '{{.State.Running}}' "$container_name" 2>/dev/null || true)"
            health="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_name" 2>/dev/null || true)"

            if [ "$health" = "healthy" ]; then
              rm -f "$archive"
              docker image prune -f --filter "until=168h" >/dev/null 2>&1 || true
              exit 0
            fi

            if [ "$running" != "true" ]; then
              docker logs --tail=120 "$container_name" || true
              exit 1
            fi

            sleep 2
          done

          docker logs --tail=120 "$container_name" || true
          exit 1
          REMOTE_SCRIPT

  deploy_production:
    name: Deploy Production
    if: always() && github.event_name != 'pull_request' && contains(fromJSON('["production", "both"]'), needs.build.outputs.deploy_target) && needs.deploy_dev.result == 'success'
    needs:
      - build
      - deploy_dev
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download backend image artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-image
          path: ${{ runner.temp }}

      - name: Checkout deployment files
        uses: actions/checkout@v4
        with:
          sparse-checkout: deploy/backend.compose.yml
          sparse-checkout-cone-mode: false

      - name: Mask deployment metadata
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          mask_value() {
            local value="$1"
            if [[ -n "$value" ]]; then
              echo "::add-mask::$value"
            fi
          }

          mask_value "$DEPLOY_HOST"

          while IFS= read -r known_host_line; do
            mask_value "$known_host_line"
            read -r known_host _ key_body _ <<< "$known_host_line"
            mask_value "$known_host"
            mask_value "$key_body"
          done <<< "$DEPLOY_KNOWN_HOSTS"

      - name: Start SSH agent
        shell: bash
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          eval "$(ssh-agent -s)" >/dev/null
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
          ssh-add - <<< "$DEPLOY_SSH_KEY" >/dev/null 2>&1

      - name: Configure known hosts
        shell: bash
        env:
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -z "$DEPLOY_KNOWN_HOSTS" ]; then
            echo "DEPLOY_KNOWN_HOSTS is required for deploy host verification." >&2
            exit 1
          fi
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy production container
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          ARCHIVE_NAME: ${{ needs.build.outputs.archive_name }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          HOST_PORT: ${{ needs.build.outputs.production_host_port }}
          CONTAINER_NAME: ${{ env.PROD_CONTAINER_NAME }}
          APP_PORT: ${{ env.APP_PORT }}
          INTERNAL_APP_PORT: ${{ env.INTERNAL_APP_PORT }}
          ENV_FILE: ${{ env.PROD_ENV_FILE }}
        run: |
          set -euo pipefail

          remote_archive="${REMOTE_IMAGE_DIR}/${ARCHIVE_NAME}"
          remote_compose_dir="$(dirname "$REMOTE_COMPOSE_FILE")"

          ssh -o LogLevel=ERROR -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$REMOTE_IMAGE_DIR' '$remote_compose_dir'"
          rsync -az -e "ssh -o LogLevel=ERROR -p $DEPLOY_PORT" "${{ runner.temp }}/${ARCHIVE_NAME}" "$DEPLOY_USER@$DEPLOY_HOST:$remote_archive"
          rsync -az -e "ssh -o LogLevel=ERROR -p $DEPLOY_PORT" "deploy/backend.compose.yml" "$DEPLOY_USER@$DEPLOY_HOST:$REMOTE_COMPOSE_FILE"

          ssh -o LogLevel=ERROR -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" 'bash -s' -- \
            "$remote_archive" "$IMAGE_TAG" "$CONTAINER_NAME" "$APP_PORT" "$INTERNAL_APP_PORT" "$HOST_PORT" "$ENV_FILE" "$REMOTE_COMPOSE_FILE" "$APP_NETWORK_NAME" <<'REMOTE_SCRIPT'
          set -euo pipefail

          archive="$1"
          image_tag="$2"
          container_name="$3"
          app_port="$4"
          internal_app_port="$5"
          host_port="$6"
          env_file="$7"
          compose_file="$8"
          network_name="$9"

          if [ ! -f "$env_file" ]; then
            echo "Missing container env file: $env_file" >&2
            exit 1
          fi

          if [ ! -f "$compose_file" ]; then
            echo "Missing backend compose file: $compose_file" >&2
            exit 1
          fi

          if ! docker compose version >/dev/null 2>&1; then
            echo "Docker Compose v2 is required to manage the shared Redis container." >&2
            exit 1
          fi

          docker network inspect "$network_name" >/dev/null 2>&1 || docker network create "$network_name" >/dev/null
          docker compose -f "$compose_file" up -d --no-recreate redis

          gzip -dc "$archive" | docker load

          docker rm -f "$container_name" >/dev/null 2>&1 || true
          docker run -d \
            --name "$container_name" \
            --restart unless-stopped \
            --add-host host.docker.internal:host-gateway \
            --network "$network_name" \
            --env-file "$env_file" \
            -e HOST=0.0.0.0 \
            -e PORT="$app_port" \
            -e BROWSER_PROOF_INTERNAL_HOST=0.0.0.0 \
            -e BROWSER_PROOF_INTERNAL_PORT="$internal_app_port" \
            -e DEBUG_MODE=false \
            -p "127.0.0.1:${host_port}:${app_port}" \
            "$image_tag"

          for _ in $(seq 1 45); do
            running="$(docker inspect --format '{{.State.Running}}' "$container_name" 2>/dev/null || true)"
            health="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_name" 2>/dev/null || true)"

            if [ "$health" = "healthy" ]; then
              rm -f "$archive"
              docker image prune -f --filter "until=168h" >/dev/null 2>&1 || true
              exit 0
            fi

            if [ "$running" != "true" ]; then
              docker logs --tail=120 "$container_name" || true
              exit 1
            fi

            sleep 2
          done

          docker logs --tail=120 "$container_name" || true
          exit 1
          REMOTE_SCRIPT