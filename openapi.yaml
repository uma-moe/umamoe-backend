        avg_careers_per_day:
          type: number
        careers_per_active_hour:
          type: number
          description: Hall list uses the last-20 career-rate window for this field.
        career_rate_sample_count:
          type: integer
        career_rate_sample_seconds:
          type: integer
          format: int64
        career_rate_breakdown:
          $ref: "#/components/schemas/CareerRateBreakdown"
        avg_career_length_last20_seconds:
          type: number
        career_length_buckets:
          type: array
          description: Five-minute estimated career-length buckets; final bucket is overflow.
          items:
            type: integer
        short_high_fan_careers:
          type: integer
        short_fan_gain_score:
          type: number
        short_fan_gain_score_buckets:
          type: array
          items:
            type: number
        short_career_avg_fan_gain:
          type: number
        short_career_p50_fan_gain:
          type: number
        short_career_p90_fan_gain:
          type: number
        short_career_p95_fan_gain:
          type: number
        short_career_max_fan_gain:
          type: number
        recent_fan_gain_3d:
          type: integer
          format: int64
        baseline_fan_gain_14d:
          type: integer
          format: int64
        recent_fans_per_day:
          type: number
        baseline_fans_per_day:
          type: number
        fan_gain_spike_ratio:
          type: number
        behavior_change_score:
          type: number
        fans_per_active_minute:
          type: number
        peak_fans_per_minute:
          type: number
        high_fan_rate_windows:
          type: integer
        high_fan_rate_total_fan_gain:
          type: integer
          format: int64
        high_fan_rate_total_seconds:
          type: integer
        max_daily_active_seconds:
          type: integer
        max_daily_careers:
          type: integer
        max_session_seconds:
          type: integer
        days_over_16h:
          type: integer
        days_over_20h:
          type: integer
        reset_recovery_windows:
          type: integer
        reset_breaks:
          type: integer
        max_reset_recovery_seconds:
          type: integer
        reset_break_score:
          type: number
        probe_score:
          type: number
        probe_metrics:
          $ref: "#/components/schemas/SuspicionProbeMetrics"
        distinct_weekly_hour_buckets:
          type: integer
        flag_no_sleep:
          type: boolean
        flag_extreme_session:
          type: boolean
        flag_inhuman_career_rate:
          type: boolean
        flag_247:
          type: boolean
        flag_marathon:
          type: boolean
        suspicion_score:
          type: integer
        is_suspicious:
          type: boolean
        evidence:
          $ref: "#/components/schemas/EvidenceSummary"

    ShameHallResponse:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/ShameHallEntry"
        total:
          type: integer
          format: int64
        page:
          type: integer
          format: int64
        limit:
          type: integer
          format: int64
        total_pages:
          type: integer
          format: int64
        suspicion_score_threshold:
          type: integer
        last_refreshed_at:
          type: string
          format: date-time
          nullable: true

    ShameDailyPoint:
      type: object
      properties:
        day:
          type: string
          format: date
        active_seconds:
          type: integer
        careers:
          type: integer
        fan_gain:
          type: integer
          format: int64
        sessions:
          type: integer
        longest_session_sec:
          type: integer
        distinct_hours:
          type: integer

    ShameHeatmapCell:
      type: object
      properties:
        dow:
          type: integer
          description: Day of week bucket from the analysis pipeline.
        hour:
          type: integer
        active_seconds:
          type: integer
        careers:
          type: integer

    ShameTopSessionBreakdown:
      type: object
      properties:
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
        duration_seconds:
          type: integer
        active_seconds:
          type: integer
        idle_seconds:
          type: integer
        careers:
          type: integer
        fan_gain:
          type: integer
          format: int64

    ShameTopSession:
      type: object
      properties:
        day:
          type: string
          format: date
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
        playtime_seconds:
          type: integer
        observed_seconds:
          type: integer
        idle_seconds:
          type: integer
        careers:
          type: integer
        fan_gain:
          type: integer
          format: int64
        session_count:
          type: integer
        longest_session_sec:
          type: integer
        distinct_hours:
          type: integer
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/ShameTopSessionBreakdown"

    ShameShortCareerTimelineSnapshot:
      type: object
      properties:
        snapshot_id:
          type: integer
          format: int64
        circle_id:
          type: integer
          format: int64
        snapshot_time:
          type: string
          format: date-time
        fans:
          type: integer
          format: int64
        last_login:
          type: string
          format: date-time
        fan_delta:
          type: integer
          format: int64
        gap_seconds:
          type: integer
        login_changed:
          type: boolean
        tight_gap:
          type: boolean
        career_count:
          type: integer
        active_seconds:
          type: integer
        observed_runtime_seconds:
          type: integer

    ShameShortCareerSnapshot:
      type: object
      properties:
        rank:
          type: integer
        total_count:
          type: integer
        snapshot_id:
          type: integer
          format: int64
        circle_id:
          type: integer
          format: int64
        snapshot_time:
          type: string
          format: date-time
        previous_snapshot_id:
          type: integer
          format: int64
        previous_snapshot_time:
          type: string
          format: date-time
        previous_snapshot_fans:
          type: integer
          format: int64
        current_fans:
          type: integer
          format: int64
        fan_gain:
          type: integer
          format: int64
        snapshot_gap_seconds:
          type: integer
        previous_career_snapshot_time:
          type: string
          format: date-time
        previous_career_gap_seconds:
          type: integer
        career_length_seconds:
          type: integer
        fans_per_minute:
          type: number
        short_training_score:
          type: number
        is_high_fan_short:
          type: boolean
        prior_snapshots:
          type: array
          items:
            $ref: "#/components/schemas/ShameShortCareerTimelineSnapshot"
        next_snapshots:
          type: array
          items:
            $ref: "#/components/schemas/ShameShortCareerTimelineSnapshot"

    ShameViewerReport:
      type: object
      properties:
        score:
          allOf:
            - $ref: "#/components/schemas/ShameHallEntry"
          nullable: true
        daily:
          type: array
          items:
            $ref: "#/components/schemas/ShameDailyPoint"
        heatmap:
          type: array
          items:
            $ref: "#/components/schemas/ShameHeatmapCell"
        top_sessions:
          type: array
          items:
            $ref: "#/components/schemas/ShameTopSession"
        short_career_snapshots:
          type: array
          items:
            $ref: "#/components/schemas/ShameShortCareerSnapshot"
        short_career_snapshots_total:
          type: integer
        last_refreshed_at:
          type: string
          format: date-time
          nullable: true

    ShameRefreshResult:
      type: object
      properties:
        snapshots_processed:
          type: integer
          format: int64
        viewers_scored:
          type: integer
          format: int64
        last_snapshot_id:
          type: integer
          format: int64
        duration_ms:
          type: integer
          format: int64

security:
  - ApiKeyAuth: []
  - BrowserProofAuth: []

# ─── Paths ─────────────────────────────────────────────────────
paths:
  # ── Search ──────────────────────────────────────────────────
  /api/v3/search:
    get:
      tags: [Search]
      summary: Search inheritance and support card records
      operationId: search
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
          description: Page number (0-indexed)
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
          description: Results per page
        - name: search_type
          in: query
          schema:
            type: string
            enum: [inheritance, support_cards, all]
            default: all
        - name: trainer_id
          in: query
          schema:
            type: string
          description: Exact trainer ID match (9-12 digits)
        - name: trainer_name
          in: query
          schema:
            type: string
          description: Partial trainer name match
        - name: max_follower_num
          in: query
          schema:
            type: integer
            default: 999
          description: Max follower count (999 = available for friend request)
        - name: main_parent_id
          in: query
          schema:
            type: array
            items:
              type: integer
          description: Main parent character IDs
        - name: exclude_main_parent_id
          in: query
          schema:
            type: array
            items:
              type: integer
          description: Exclude these main parent IDs
        - name: parent_id
          in: query
          schema:
            type: array
            items:
              type: integer
          description: Match left OR right parent
        - name: parent_left_id
          in: query
          schema:
            type: array
            items:
              type: integer
          description: Match left parent only
        - name: parent_right_id
          in: query
          schema:
            type: array
            items:
              type: integer
          description: Match right parent only
        - name: exclude_parent_id
          in: query
          schema:
            type: array
            items:
              type: integer
          description: Exclude from left or right parent
        - name: parent_rank
          in: query
          schema:
            type: integer
          description: Parent star rank
        - name: parent_rarity
          in: query
          schema:
            type: integer
          description: Parent rarity
        - name: blue_sparks
          in: query
          schema:
            type: array
            items:
              type: string
          description: Blue spark character IDs
        - name: pink_sparks
          in: query
          schema:
            type: array
            items:
              type: string
          description: Pink spark character IDs
        - name: green_sparks
          in: query
          schema:
            type: array
            items:
              type: string
          description: Green spark character IDs
        - name: white_sparks
          in: query
          schema:
            type: array
            items:
              type: string
          description: White spark character IDs
        - name: blue_sparks_9star
          in: query
          schema:
            type: boolean
          description: Has 9-star blue spark
        - name: pink_sparks_9star
          in: query
          schema:
            type: boolean
          description: Has 9-star pink spark
        - name: green_sparks_9star
          in: query
          schema:
            type: boolean
          description: Has 9-star green spark
        - name: main_parent_blue_sparks
          in: query
          schema:
            type: array
            items:
              type: string
          description: Main parent blue sparks
        - name: main_parent_pink_sparks
          in: query
          schema:
            type: array
            items:
              type: string
          description: Main parent pink sparks
        - name: main_parent_green_sparks
          in: query
          schema:
            type: array
            items:
              type: string
          description: Main parent green sparks
        - name: main_parent_white_sparks
          in: query
          schema:
            type: array
            items:
              type: string
          description: Main parent white sparks
        - name: min_main_blue_factors
          in: query
          schema:
            type: integer
          description: Minimum main blue factor count
        - name: min_main_pink_factors
          in: query
          schema:
            type: integer
          description: Minimum main pink factor count
        - name: min_main_green_factors
          in: query
          schema:
            type: integer
          description: Minimum main green factor count
        - name: main_white_factors
          in: query
          schema:
            type: array
            items:
              type: string
          description: Specific white factor types
        - name: min_main_white_count
          in: query
          schema:
            type: integer
          description: Minimum white factor count
        - name: min_blue_stars_sum
          in: query
          schema:
            type: integer
        - name: max_blue_stars_sum
          in: query
          schema:
            type: integer
        - name: min_pink_stars_sum
          in: query
          schema:
            type: integer
        - name: max_pink_stars_sum
          in: query
          schema:
            type: integer
        - name: min_green_stars_sum
          in: query
          schema:
            type: integer
        - name: max_green_stars_sum
          in: query
          schema:
            type: integer
        - name: min_white_stars_sum
          in: query
          schema:
            type: integer
        - name: max_white_stars_sum
          in: query
          schema:
            type: integer
        - name: min_win_count
          in: query
          schema:
            type: integer
          description: Minimum race win count
        - name: min_white_count
          in: query
          schema:
            type: integer
          description: Minimum white skill count
        - name: optional_white_sparks
          in: query
          schema:
            type: array
            items:
              type: string
          description: Preferred white sparks (soft filter)
        - name: optional_main_white_factors
          in: query
          schema:
            type: array
            items:
              type: string
          description: Preferred main white factors (soft filter)
        - name: support_card_id
          in: query
          schema:
            type: integer
          description: Filter by support card ID
        - name: min_limit_break
          in: query
          schema:
            type: integer
        - name: max_limit_break
          in: query
          schema:
            type: integer
        - name: min_experience
          in: query
          schema:
            type: integer
        - name: sort_by
          in: query
          schema:
            type: string
          description: Sort field name
        - name: sort_order
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: player_chara_id
          in: query
          schema:
            type: integer
          description: Character ID for affinity calculation
        - name: player_chara_id_2
          in: query
          schema:
            type: integer
          description: Secondary character for affinity
        - name: desired_main_chara_id
          in: query
          schema:
            type: integer
          description: Filter by desired main character
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"

  /api/v3/count:
    get:
      tags: [Search]
      summary: Count matching records (same filters as search)
      operationId: count
      parameters:
        - $ref: "#/paths/~1api~1v3~1search/get/parameters/2"
        - $ref: "#/paths/~1api~1v3~1search/get/parameters/3"
        - $ref: "#/paths/~1api~1v3~1search/get/parameters/4"
      responses:
        "200":
          description: Result count
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                    format: int64

  # ── Circles ─────────────────────────────────────────────────
  /api/v4/circles:
    get:
      tags: [Circles]
      summary: Get circle details and member fan data
      operationId: getCircle
      description: At least one of `viewer_id` or `circle_id` must be provided.
      parameters:
        - name: viewer_id
          in: query
          schema:
            type: integer
            format: int64
          description: Get circle for this trainer
        - name: circle_id
          in: query
          schema:
            type: integer
            format: int64
          description: Get circle by ID
        - name: month
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 12
          description: Defaults to the current game month starting at the 2nd JST. Rankings still use the 3rd JST carryover rule.
        - name: year
          in: query
          schema:
            type: integer
          description: Defaults to the current game year starting at the 2nd JST when `month` is omitted.
      responses:
        "200":
          description: Circle with members
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CircleResponse"
        "400":
          description: Missing viewer_id or circle_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v4/circles/list:
    get:
      tags: [Circles]
      summary: List and search circles
      operationId: listCircles
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
          description: Page number (0-indexed)
        - name: limit
          in: query
          schema:
            type: integer
        - name: name
          in: query
          schema:
            type: string
          description: Partial match on circle name
        - name: min_members
          in: query
          schema:
            type: integer
        - name: max_rank
          in: query
          schema:
            type: integer
          description: Maximum monthly rank (lower = better)
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [name, member_count, monthly_rank, monthly_point]
        - name: sort_dir
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: query
          in: query
          schema:
            type: string
          description: "General search: circle ID/name, leader ID/name, member ID/name"
      responses:
        "200":
          description: Paginated circle list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CircleListResponse"

  /api/v4/circles/rank-thresholds:
    get:
      tags: [Circles]
      summary: Get fan requirements for each circle rank tier
      operationId: getCircleRankThresholds
      description: Returns the ranking ranges and current minimum fan counts for each circle rank tier (D through SS).
      responses:
        "200":
          description: Rank tier thresholds
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RankThresholdsResponse"

  # ── Rankings ────────────────────────────────────────────────
  /api/v4/rankings/monthly:
    get:
      tags: [Rankings]
      summary: Monthly fan gain rankings
      operationId: getMonthlyRankings
      parameters:
        - name: month
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 12
          description: Defaults to current month (JST)
        - name: year
          in: query
          schema:
            type: integer
          description: Defaults to current year (JST)
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 100
        - name: query
          in: query
          schema:
            type: string
          description: "viewer_id (exact), trainer_name or circle_name (partial)"
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [monthly_gain, total_fans, active_days, avg_daily, avg_3d, avg_7d, avg_monthly]
            default: monthly_gain
      responses:
        "200":
          description: Monthly rankings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyRankingsResponse"

  /api/v4/rankings/alltime:
    get:
      tags: [Rankings]
      summary: All-time fan rankings
      operationId: getAlltimeRankings
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 100
        - name: query
          in: query
          schema:
            type: string
          description: "viewer_id (exact), trainer_name or circle_name (partial)"
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [total_gain, total_fans, avg_day, avg_week, avg_month]
            default: total_gain
      responses:
        "200":
          description: All-time rankings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlltimeRankingsResponse"

  /api/v4/rankings/gains:
    get:
      tags: [Rankings]
      summary: Rolling gain rankings (3d/7d/30d)
      operationId: getGainsRankings
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 100
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [gain_3d, gain_7d, gain_30d]
            default: gain_30d
        - name: query
          in: query
          schema:
            type: string
          description: "viewer_id (exact), trainer_name or circle_name (partial)"
      responses:
        "200":
          description: Gains rankings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GainsRankingsResponse"

  # ── Profile ─────────────────────────────────────────────────
  /api/v4/user/profile/{account_id}:
    get:
      tags: [Profile]
      summary: Get complete user profile
      operationId: getProfile
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: string
          description: Trainer account ID (9-12 digits)
      responses:
        "200":
          description: Full profile data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "404":
          description: Trainer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v4/user/profile/veterans/{veteran_id}:
    get:
      tags: [Profile]
      summary: Get a single veteran character by UUID
      operationId: getVeteran
      description: Lightweight veteran payload for sharing without loading the full profile. Respects profile and veteran-section privacy.
      parameters:
        - name: veteran_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Stable veteran UUID from `ProfileResponse.veterans[].id`
      responses:
        "200":
          description: Veteran character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VeteranCharacter"
        "403":
          description: Profile or veterans are hidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Veteran not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Suspicious Activity ─────────────────────────────────────
  /api/v4/shame/hall:
    get:
      tags: [Shame]
      summary: List suspicious activity entries
      operationId: getHallOfShame
      description: Returns paginated suspicious-activity summaries with evidence explanations. Defaults to the configured suspicious score threshold and at least 3 observed days.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            format: int64
            default: 0
          description: Page number (0-indexed)
        - name: limit
          in: query
          schema:
            type: integer
            format: int64
            default: 50
            minimum: 1
            maximum: 200
          description: Results per page
        - name: sort_by
          in: query
          schema:
            type: string
            enum:
              - score
              - behavior_change
              - short_fan_gain
              - short_high_fan
              - max_session
              - longest_session
              - online_streak
              - careers_per_hour
              - avg_careers_per_day
              - avg_career_length
              - careers
              - active_time
              - fans_per_minute
              - peak_fans_per_minute
              - reset_breaks
              - long_hours
              - probe_score
              - career_quantization
              - career_regularity
              - login_regularity
              - zero_idle
              - burst_careers
              - coactivity
          description: Sort mode. Empty or omitted uses suspicion score descending.
        - name: min_score
          in: query
          schema:
            type: integer
          description: Minimum suspicion score. Defaults to the server threshold.
        - name: min_days
          in: query
          schema:
            type: integer
            default: 3
          description: Minimum observed days.
        - name: query
          in: query
          schema:
            type: string
          description: Search by viewer_id, current circle_id, trainer name, or current circle name.
      responses:
        "200":
          description: Paginated suspicious activity entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShameHallResponse"

  /api/v4/shame/viewer/{viewer_id}:
    get:
      tags: [Shame]
      summary: Get suspicious activity report for a viewer
      operationId: getShameViewerReport
      parameters:
        - name: viewer_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Trainer account ID / viewer ID
        - name: days
          in: query
          schema:
            type: integer
            format: int64
            default: 60
            minimum: 1
            maximum: 365
          description: Number of recent daily points to include.
      responses:
        "200":
          description: Suspicious activity report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShameViewerReport"

  /api/v4/shame/refresh:
    post:
      tags: [Shame]
      summary: Rebuild suspicious activity analysis now
      operationId: refreshShameAnalysis
      description: Manual/debug endpoint. In production it requires `CHEAT_ANALYSIS_REFRESH_TOKEN` to be configured server-side and is intended for admin use.
      parameters:
        - name: full
          in: query
          schema:
            type: boolean
            default: false
          description: Accepted for backward compatibility; the Rust pipeline always performs a full rebuild.
      responses:
        "200":
          description: Refresh result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShameRefreshResult"
        "403":
          description: Refresh disabled or forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── System ──────────────────────────────────────────────────
  /api/health:
    get:
      security: []
      tags: [System]
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /api/ver:
    get:
      security: []
      tags: [System]
      summary: Get current server version
      operationId: getVersion
      responses:
        "200":
          description: Current version info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"
        "404":
          description: No version entries found

  /api/ver/history:
    get:
      security: []
      tags: [System]
      summary: Get version history
      operationId: getVersionHistory
      description: Returns the current version as top-level fields and all previous versions in the history array.
      responses:
        "200":
          description: Current version with full history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionHistoryResponse"
        "404":
          description: No version entries found

