openapi: 3.1.0
info:
  title: uma.moe API
  description: |
    API for uma.moe — Umamusume inheritance search, circle tracking, fan rankings, and trainer profiles.

    API endpoints are protected against scraping. Send either an `X-API-Key` header or a valid `X-Browser-Proof` header.
    The version endpoints `/api/ver` and `/api/ver/history` are public and require no protection header.
  version: 1.0.0
  contact:
    name: uma.moe
    url: https://uma.moe

servers:
  - url: https://uma.moe
    description: Production

tags:
  - name: Search
    description: Inheritance and support card search
  - name: Circles
    description: Circle info and member fan data
  - name: Rankings
    description: Monthly, all-time, and rolling gain rankings
  - name: Profile
    description: Trainer profile (circle history, fan history, inheritance)
  - name: Shame
    description: Suspicious activity analysis and viewer reports
  - name: System
    description: Health check and version info

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for server-to-server access and usage tracking.
    BrowserProofAuth:
      type: apiKey
      in: header
      name: X-Browser-Proof
      description: Browser proof token issued by the frontend protection flow.

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        status:
          type: integer
        details:
          type: string
      required: [error, status]

    VersionResponse:
      type: object
      properties:
        app_version:
          type: string
        resource_version:
          type: string
        updated_at:
          type: string
          description: ISO 8601 timestamp

    VersionHistoryResponse:
      type: object
      properties:
        current:
          $ref: "#/components/schemas/VersionResponse"
          description: Latest version entry
        history:
          type: array
          description: All previous version entries (newest first)
          items:
            $ref: "#/components/schemas/VersionResponse"

    SearchResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/UnifiedAccountRecord"
        total:
          type: string
          description: Numeric string, or "over 10000" for large result sets
        page:
          type: integer
        limit:
          type: integer
        total_pages:
          type: integer

    UnifiedAccountRecord:
      type: object
      properties:
        account_id:
          type: string
        trainer_name:
          type: string
        follower_num:
          type: integer
          nullable: true
        last_updated:
          type: string
          format: date-time
          nullable: true
        inheritance:
          $ref: "#/components/schemas/Inheritance"
        support_card:
          $ref: "#/components/schemas/SupportCard"

    Inheritance:
      type: object
      properties:
        inheritance_id:
          type: integer
        account_id:
          type: string
        main_parent_id:
          type: integer
        parent_left_id:
          type: integer
        parent_right_id:
          type: integer
        parent_rank:
          type: integer
        parent_rarity:
          type: integer
        blue_sparks:
          type: array
          items:
            type: integer
        pink_sparks:
          type: array
          items:
            type: integer
        green_sparks:
          type: array
          items:
            type: integer
        white_sparks:
          type: array
          items:
            type: integer
        win_count:
          type: integer
        white_count:
          type: integer
        main_blue_factors:
          type: integer
        main_pink_factors:
          type: integer
        main_green_factors:
          type: integer
        main_white_factors:
          type: array
          items:
            type: integer
        main_white_count:
          type: integer
        affinity_score:
          type: integer
          nullable: true

    SupportCard:
      type: object
      properties:
        account_id:
          type: string
        support_card_id:
          type: integer
        limit_break_count:
          type: integer
          nullable: true
        experience:
          type: integer

    # ── Circles ────────────────────────────────────────────────
    Circle:
      type: object
      properties:
        circle_id:
          type: integer
          format: int64
        name:
          type: string
        comment:
          type: string
          nullable: true
        leader_viewer_id:
          type: integer
          format: int64
          nullable: true
        leader_name:
          type: string
          nullable: true
        member_count:
          type: integer
          nullable: true
        join_style:
          type: integer
          nullable: true
        policy:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        last_updated:
          type: string
          format: date-time
          nullable: true
        monthly_rank:
          type: integer
          nullable: true
          description: Effective current/display rank. During the rollover display window this can show the completed-month rank so local ranking stays stable.
        monthly_point:
          type: integer
          format: int64
          nullable: true
          description: Effective current/display points. During the rollover display window this can show completed-month points. Archived circles use their frozen monthly values until they leave rankings at the 3rd JST cutoff.
        last_month_rank:
          type: integer
          nullable: true
        last_month_point:
          type: integer
          format: int64
          nullable: true
        archived:
          type: boolean
          nullable: true
        yesterday_updated:
          type: string
          format: date-time
          nullable: true
        yesterday_points:
          type: integer
          format: int64
          nullable: true
        yesterday_rank:
          type: integer
          nullable: true
        live_points:
          type: integer
          format: int64
          nullable: true
          description: Top-100 circles only, updates every 5 minutes. Hidden during carryover where it would conflict with the completed-month display payload.
        live_rank:
          type: integer
          nullable: true
          description: Top-100 circles only, updates every 5 minutes. Hidden during carryover where it would conflict with the completed-month display payload.
        last_live_update:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the last live_points update.

    CircleMemberFansMonthly:
      type: object
      properties:
        id:
          type: integer
        circle_id:
          type: integer
          format: int64
        viewer_id:
          type: integer
          format: int64
        trainer_name:
          type: string
          nullable: true
        shame_score:
          type: integer
          nullable: true
        year:
          type: integer
        month:
          type: integer
        daily_fans:
          type: array
          items:
            type: integer
            format: int64
          description: 31-element array of cumulative daily fan totals
        last_updated:
          type: string
          format: date-time
          nullable: true
        previous_circle_id:
          type: integer
          format: int64
          nullable: true
        previous_circle_name:
          type: string
          nullable: true
        next_month_start:
          type: integer
          format: int64
          nullable: true

    CircleResponse:
      type: object
      properties:
        circle:
          $ref: "#/components/schemas/Circle"
        members:
          type: array
          items:
            $ref: "#/components/schemas/CircleMemberFansMonthly"
        club_rank:
          type: integer
          nullable: true
        fans_to_next_tier:
          type: integer
          format: int64
          nullable: true
        fans_to_lower_tier:
          type: integer
          format: int64
          nullable: true
        yesterday_fans_to_next_tier:
          type: integer
          format: int64
          nullable: true
        yesterday_fans_to_lower_tier:
          type: integer
          format: int64
          nullable: true

    CircleWithRank:
      type: object
      allOf:
        - $ref: "#/components/schemas/Circle"

    CircleListResponse:
      type: object
      properties:
        circles:
          type: array
          items:
            $ref: "#/components/schemas/CircleWithRank"
        total:
          type: integer
          format: int64
        page:
          type: integer
          format: int64
        limit:
          type: integer
          format: int64
        total_pages:
          type: integer
          format: int64

    RankThreshold:
      type: object
      properties:
        rank_index:
          type: integer
          description: "Numeric rank index (1=D, 2=D+, ... 11=SS)"
        name:
          type: string
          description: "Tier name (D, D+, C, C+, B, B+, A, A+, S, S+, SS)"
        ranking_from:
          type: integer
          nullable: true
          description: "First ranking position in this tier (null for D)"
        ranking_to:
          type: integer
          nullable: true
          description: "Last ranking position in this tier (null for D+ and D)"
        current_min_fans:
          type: integer
          format: int64
          nullable: true
          description: "Current minimum fans needed to reach this tier boundary (null when the tier has no boundary)"
        current_fans_per_day:
          type: integer
          format: int64
          nullable: true
          description: "Current boundary total divided by elapsed JST days in the current month, rounded up"
        yesterday_min_fans:
          type: integer
          format: int64
          nullable: true
          description: "Yesterday's minimum fans at the same tier boundary"
        yesterday_fans_per_day:
          type: integer
          format: int64
          nullable: true
          description: "Yesterday boundary total divided by elapsed JST days as of yesterday, rounded up"
        daily_fans_delta:
          type: integer
          format: int64
          nullable: true
          description: "Difference between current_min_fans and yesterday_min_fans"
        last_month_min_fans:
          type: integer
          format: int64
          nullable: true
          description: "Minimum fans at the same tier boundary last month"
        last_month_fans_per_day:
          type: integer
          format: int64
          nullable: true
          description: "Last month's boundary total divided by the number of days in the previous month, rounded up"
        current_vs_last_month_delta:
          type: integer
          format: int64
          nullable: true
          description: "Difference between current_min_fans and last_month_min_fans"

    RankThresholdsResponse:
      type: object
      properties:
        thresholds:
          type: array
          items:
            $ref: "#/components/schemas/RankThreshold"

