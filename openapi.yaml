    # -- Suspicious Activity -----------------------------------------------
    EvidenceReason:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        severity:
          type: string
          enum: [critical, high, medium, low, info]
        confidence:
          type: string
          enum: [strong, medium, contextual]
        message:
          type: string
        display_value:
          type: string
        caveat:
          type: string
          nullable: true

    EvidenceSummary:
      type: object
      properties:
        verdict:
          type: string
          description: Machine-readable verdict for badges and filtering.
        summary:
          type: string
        strongest_signal:
          type: string
          nullable: true
        reasons:
          type: array
          items:
            $ref: "#/components/schemas/EvidenceReason"
        caveats:
          type: array
          items:
            type: string

