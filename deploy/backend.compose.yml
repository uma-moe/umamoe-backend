name: umamoe-backend

services:
  redis:
    image: redis:7-alpine
    container_name: umamoe-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      backend:
        aliases:
          - redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  backend:
    external: true
    name: umamoe-services

volumes:
  redis-data:
    name: umamoe-redis-data